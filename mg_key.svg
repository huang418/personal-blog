      <stop offset="0%" stop-color="#FFE066"/><stop offset="60%" stop-color="#FFC107"/><stop offset="100%" stop-color="#FF8F00"/>
    </radialGradient>
  </defs>
  <circle cx="20" cy="20" r="14" fill="url(#kG)" stroke="#D4A000" stroke-width="1.5"/>
