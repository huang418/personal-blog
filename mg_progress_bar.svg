<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 24" width="100" height="24">
  <rect x="0" y="2" width="100" height="20" rx="10" fill="#1A0A3E" stroke="#3A2A7E" stroke-width="1"/>
  <rect x="2" y="4" width="96" height="16" rx="9" fill="#2A1A5E"/>
  <!-- Progress fill - default 60% -->
  <rect x="2" y="4" width="58" height="16" rx="9" fill="url(#progG)"/>
  <defs>
    <linearGradient id="progG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E676"/><stop offset="60%" stop-color="#FFC107"/><stop offset="100%" stop-color="#FF5252"/>
    </linearGradient>
  </defs>
  <!-- Tick marks -->
  <line x1="20" y1="4" x2="20" y2="10" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
  <line x1="40" y1="4" x2="40" y2="10" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
  <line x1="60" y1="4" x2="60" y2="10" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
  <line x1="80" y1="4" x2="80" y2="10" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
</svg>
